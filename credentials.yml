# Credentials configuration using 1Password secret references
# Format: op://vault/item/field
# Environment: production
#
# This file contains references to secrets stored in 1Password.
# The actual secret values are resolved at runtime using the 1Password API.
# Never commit actual credentials to version control.
---

metadata:
  environment: "production"
  version: "1.1.0"
  last_updated: "2026-04-04"
  description: "Credentials for the SSD backup service — Slack notifications, AWS S3 storage, and LUKS drive unlock."

# Slack credentials
# Used for sending backup status notifications to #opn-backup
slack_creds:
  bot_token: "op://onboard credentials/OPN Backup App/Slack App/bot_token"

# LUKS credentials
# Used by backup-usb.sh to unlock the encrypted SSD unattended
luks_creds:
  passphrase: "op://onboard credentials/fw-fw13 ssd-encrypt backup/SSD Encryption/passphrase"

# AWS credentials
# Used by backup-usb.sh / rclone to sync backups to S3
aws_creds:
  access_key_id: "op://onboard credentials/fw-fw13 ssd-encrypt backup/AWS SS3 Creds/AWS_ACCESS_KEY_ID"
  secret_access_key: "op://onboard credentials/fw-fw13 ssd-encrypt backup/AWS SS3 Creds/AWS_SECRET_ACCESS_KEY"
  default_region: "op://onboard credentials/fw-fw13 ssd-encrypt backup/AWS SS3 Creds/AWS_DEFAULT_REGION"
